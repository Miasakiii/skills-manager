name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skills-manager-prototype
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run tests
        env:
          SKILLS_NO_AUTO_TRANSLATE: "1"
        run: |
          pytest tests/ -q --tb=short

      - name: Coverage check
        if: matrix.python-version == '3.11'
        env:
          SKILLS_NO_AUTO_TRANSLATE: "1"
        run: |
          pytest tests/ --cov=skills_manager --cov-report=term-missing --cov-fail-under=80 -q

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skills-manager-prototype
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install ruff

      - name: Ruff check
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/
